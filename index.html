<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Анамнез спортсмена</title>

  <!-- Фавикон бренда: круглый знак (SVG), PNG-фолбэк и иконка для iOS. -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon-round.svg">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <meta name="theme-color" content="#0B1A33">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Шапка: логотип слева; на телефоне справа — кнопка-бургер, открывающая
       меню разделов. Логотип берётся из assets/logo.* (см. assets/README.md). -->
  <header id="app-header">
    <div class="brand">
      <img id="brand-logo" alt="Логотип">
    </div>
    <button id="nav-toggle" type="button" aria-label="Меню разделов" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
  </header>

  <!-- Лейаут: слева бар разделов (вертикальный на десктопе; на телефоне —
       выезжающее справа меню-drawer), справа — текущий блок анкеты. Оба
       контейнера монтируются из app.js в зависимости от состояния опросника. -->
  <div id="layout">
    <nav id="section-nav" aria-label="Разделы анкеты"></nav>
    <main id="app"></main>
  </div>

  <!-- Затемнение под выезжающее меню (только на телефоне). -->
  <div id="nav-overlay"></div>

  <script type="module" src="app.js"></script>
</body>

</html>
